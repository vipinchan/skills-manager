name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-mode:
    runs-on: ubuntu-latest
    outputs:
      has_updater_signing_key: ${{ steps.detect.outputs.has_updater_signing_key }}
    steps:
      - name: Detect updater signing key
        id: detect
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if [ -n "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            echo "has_updater_signing_key=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_updater_signing_key=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: release-mode
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            label: macOS-arm64
          - platform: macos-latest
            target: x86_64-apple-darwin
            label: macOS-x64
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: Linux-x64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: Windows-x64

    runs-on: ${{ matrix.platform }}
    name: Build (${{ matrix.label }})
    env:
      HAS_UPDATER_SIGNING_KEY: ${{ needs.release-mode.outputs.has_updater_signing_key }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          VERSION=$(node -p "require('./package.json').version")
          TAG="v${VERSION}"
          if [[ "${GITHUB_REF}" == refs/tags/* && "${GITHUB_REF_NAME}" != "$TAG" ]]; then
            echo "Tag ${GITHUB_REF_NAME} does not match package.json version ${VERSION}; expected ${TAG}." >&2
            exit 1
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri
          # Restore-only: the post-build cache *save* on Windows intermittently
          # fails (a lingering vctip.exe locks files in target/ while tar/zstd
          # packs the cache), marking an otherwise-successful release job red.
          # Release builds run rarely, so skipping the save avoids the false
          # failure at negligible cost. See v1.22.3 Windows-x64 run.
          save-if: false

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Disable updater artifacts when signing key is unavailable
        if: env.HAS_UPDATER_SIGNING_KEY != 'true'
        shell: bash
        run: |
          node --input-type=module <<'NODE'
          import fs from 'node:fs';
          const configPath = 'src-tauri/tauri.conf.json';
          const config = JSON.parse(fs.readFileSync(configPath, 'utf8'));
          config.bundle = config.bundle || {};
          config.bundle.createUpdaterArtifacts = false;
          fs.writeFileSync(configPath, `${JSON.stringify(config, null, 2)}\n`);
          NODE

      - name: Windows smoke check
        if: matrix.platform == 'windows-latest'
        run: cargo check --manifest-path src-tauri/Cargo.toml

      - name: Extract changelog for current version
        id: changelog
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          RELEASE_TAG="${{ steps.version.outputs.tag }}"
          BODY_EN=$(sed -n "/^## \[${VERSION}\]/,/^## \[/{ /^## \[${VERSION}\]/d; /^## \[/d; p; }" CHANGELOG.md | awk -f scripts/strip-empty-sections.awk)
          BODY_ZH=$(sed -n "/^## \[${VERSION}\]/,/^## \[/{ /^## \[${VERSION}\]/d; /^## \[/d; p; }" CHANGELOG-zh.md | awk -f scripts/strip-empty-sections.awk)
          # Release date: prefer the date on the CHANGELOG heading; fall back to today.
          RELEASE_DATE=$(grep -m1 "^## \[${VERSION}\] - " CHANGELOG.md | sed -E "s/^## \[${VERSION}\] - ([0-9-]+).*/\1/")
          if [ -z "$RELEASE_DATE" ]; then RELEASE_DATE=$(date -u +%Y-%m-%d); fi
          # Previous tag for the commit range (skip the current tag itself).
          PREV_TAG=$(git tag --sort=-v:refname --merged "$RELEASE_TAG" | grep -v "^${RELEASE_TAG}$" | head -n1 || true)
          if [ -n "$PREV_TAG" ]; then
            COMPARE_URL="https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${RELEASE_TAG}"
            RANGE_LINE="递交范围：[\`${PREV_TAG}...${RELEASE_TAG}\`](${COMPARE_URL})"
            RANGE_LINE_EN="Commit range: [\`${PREV_TAG}...${RELEASE_TAG}\`](${COMPARE_URL})"
            FULL_LINE="**完整变更**：[\`${PREV_TAG}...${RELEASE_TAG}\`](${COMPARE_URL})"
          else
            RANGE_LINE="递交范围：首个发布版本"
            RANGE_LINE_EN="Commit range: initial release"
            FULL_LINE="**完整变更**：首个发布版本"
          fi
          {
            echo "body<<EOF"
            echo "## Skills Manager ${RELEASE_TAG}"
            echo ""
            echo "发布日期：\`${RELEASE_DATE}\`"
            echo "${RANGE_LINE}"
            echo ""
            echo "$BODY_ZH"
            echo ""
            echo "### 当前校验状态"
            echo ""
            echo "- ✅ 跨平台构建通过（macOS Intel / macOS ARM / Windows x64 / Linux x64）"
            echo "- ✅ TypeScript typecheck 通过"
            echo ""
            echo "---"
            echo ""
            echo "<details><summary>English release notes</summary>"
            echo ""
            echo "Release date: \`${RELEASE_DATE}\`"
            echo "${RANGE_LINE_EN}"
            echo ""
            echo "$BODY_EN"
            echo ""
            echo "### Current Verification"
            echo ""
            echo "- ✅ Cross-platform build passed (macOS Intel / macOS ARM / Windows x64 / Linux x64)"
            echo "- ✅ TypeScript typecheck passed"
            echo ""
            echo "</details>"
            echo ""
            echo "---"
            echo ""
            echo "${FULL_LINE}"
            echo ""
            echo "Full changelog files: [English](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) | [中文](https://github.com/${{ github.repository }}/blob/main/CHANGELOG-zh.md)"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build with Tauri
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Ad-hoc sign macOS bundles so Gatekeeper reports "unverified developer"
          # (dismissable via right-click → Open) instead of "app is damaged".
          # Without this, the linker-only signature has no sealed resources and
          # `codesign --verify` fails. See issue #138.
          APPLE_SIGNING_IDENTITY: ${{ startsWith(matrix.platform, 'macos') && '-' || '' }}
        with:
          tagName: ${{ steps.version.outputs.tag }}
          releaseName: 'Skills Manager ${{ steps.version.outputs.tag }}'
          releaseBody: ${{ steps.changelog.outputs.body }}
          releaseDraft: false
          prerelease: false
          updaterJsonKeepUniversal: true
          args: --target ${{ matrix.target }}

      - name: Verify macOS bundle signature
        if: startsWith(matrix.platform, 'macos')
        run: |
          set -euo pipefail
          APP_PATH="src-tauri/target/${{ matrix.target }}/release/bundle/macos/skills-manager.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "Expected app bundle not found at $APP_PATH" >&2
            exit 1
          fi
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"
          codesign -dvvv "$APP_PATH" 2>&1 | grep -E 'Signature|Sealed Resources|Identifier'

  verify-updater-assets:
    needs: [release-mode, build]
    if: startsWith(github.ref, 'refs/tags/') && needs.release-mode.outputs.has_updater_signing_key == 'true'
    runs-on: ubuntu-latest
    name: Verify updater assets
    steps:
      - name: Validate updater metadata and signatures
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          api_url="https://api.github.com/repos/${{ github.repository }}/releases/tags/${{ github.ref_name }}"
          release_json=$(curl -fsSL \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "$api_url")

          asset_names=$(echo "$release_json" | jq -r '.assets[]?.name')

          if ! echo "$asset_names" | grep -qx 'latest.json'; then
            echo "Missing updater metadata asset: latest.json"
            exit 1
          fi

          if ! echo "$asset_names" | grep -q '\.sig'; then
            echo "Missing updater signature assets (*.sig)"
            exit 1
          fi

          latest_url="https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/latest.json"
          curl -fsSL "$latest_url" >/tmp/latest.json

          if ! jq -e 'has("platforms") and (.platforms | has("windows-x86_64"))' /tmp/latest.json >/dev/null; then
            echo "latest.json does not include windows-x86_64 updater entry"
            cat /tmp/latest.json
            exit 1
          fi

          if ! jq -e '.platforms["windows-x86_64"].signature and .platforms["windows-x86_64"].url' /tmp/latest.json >/dev/null; then
            echo "windows-x86_64 updater entry is missing signature/url"
            cat /tmp/latest.json
            exit 1
          fi

          echo "Updater assets validation passed"
